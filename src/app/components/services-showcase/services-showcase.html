<section id="servicios" class="py-20 md:py-32 bg-[#0D0608]">
  <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 md:px-8">

    <!-- Header -->
    <div class="text-center mb-12 md:mb-16">
      <span class="text-[#FFBB00] font-bold tracking-widest uppercase text-xs animate-slide-down">SERVICIOS</span>
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold mt-3 md:mt-4 mb-3 md:mb-6 text-white animate-slide-up animate-stagger-1">
        Nuestros Servicios Destacados
      </h2>
      <p class="text-white/60 text-sm sm:text-base md:text-lg max-w-2xl mx-auto animate-slide-up animate-stagger-2">
        Explora nuestro catálogo completo de tratamientos y servicios de bienestar integral.
      </p>
    </div>

    <!-- Services Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5 md:gap-6">
      @for (service of services; track service.id; let i = $index) {
        <button
          (click)="scrollToCategory(service.id)"
          class="text-left bg-[#160B0D] border border-white/10 rounded-2xl p-6 sm:p-8 hover:shadow-lg hover:scale-105 hover:translate-y-[-4px] transition-all active:scale-100 animate-scale-in group cursor-pointer border-2 hover:border-[#FFBB00]/30"
          [ngClass]="'animate-stagger-' + ((i % 6) + 1)">

          <!-- Icon -->
          <div class="mb-4 inline-flex items-center justify-center p-3 rounded-xl bg-[#FFBB00]/10 group-hover:bg-[#FFBB00]/20 transition-colors">
            <span class="material-symbols-outlined text-[#FFBB00] text-2xl sm:text-3xl group-hover:scale-110 transition-transform">
              {{ service.icon }}
            </span>
          </div>

          <!-- Service Name -->
          <h3 class="text-lg sm:text-xl font-bold text-white mb-2 group-hover:text-[#FFBB00] transition-colors">
            {{ service.name }}
          </h3>

          <!-- Category Badge -->
          <span class="inline-block text-xs font-semibold text-[#FFBB00] bg-[#FFBB00]/10 px-3 py-1 rounded-full mb-3">
            {{ service.category }}
          </span>

          <!-- Description -->
          <p class="text-xs sm:text-sm text-white/60 leading-relaxed mb-4">
            {{ service.description }}
          </p>

          <!-- CTA -->
          <div class="flex items-center gap-2 text-[#FFBB00] font-semibold text-sm group-hover:gap-3 transition-all">
            <span>Ver en catálogo</span>
            <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
          </div>

        </button>
      }
    </div>

  </div>
</section>
