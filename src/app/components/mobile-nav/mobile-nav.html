<nav class="fixed bottom-0 left-0 right-0 z-50 rounded-t-3xl md:hidden bg-[#FBFBE2] shadow-[0_-10px_30px_rgba(27,29,14,0.08)] overflow-x-hidden">
  <div class="flex justify-around items-center px-2 sm:px-4 pb-4 pt-2 gap-1">
    @for (item of items; track item.id) {
      <div
        class="flex flex-col items-center justify-center rounded-2xl p-2 cursor-pointer transition-all"
        [class.bg-[#556B2F]]="activeItem() === item.id"
        [class.text-white]="activeItem() === item.id"
        [class.text-[#556B2F]]="activeItem() !== item.id"
        (click)="scrollTo(item.id)">
        <span class="material-symbols-outlined">{{ item.icon }}</span>
        <span class="text-[10px] font-medium uppercase tracking-widest">{{ item.label }}</span>
      </div>
    }
  </div>
</nav>
