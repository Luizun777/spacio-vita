<section class="py-32 bg-[#FBFBE2]">
  <div class="max-w-screen-2xl mx-auto px-8">
    <h2 class="text-4xl font-bold text-center mb-16 animate-slide-down">Lo que dicen nuestros pacientes</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      @for (t of testimonials; track t.name; let i = $index) {
        <div class="bg-surface-container-lowest p-10 rounded-2xl hover:shadow-lg hover:scale-105 transition-all animate-slide-up"
             [class.translate-y-4]="i === 1"
             [ngClass]="'animate-stagger-' + ((i % 6) + 1)">
          <!-- Stars -->
          <div class="flex text-primary mb-4">
            @for (star of stars; track star) {
              <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
            }
          </div>
          <!-- Quote -->
          <p class="text-on-surface-variant italic mb-8">"{{ t.quote }}"</p>
          <!-- Author -->
          <div class="flex items-center justify-between gap-4">
            <div class="flex items-center gap-4 flex-1">
              <div class="w-12 h-12 rounded-full" [class]="t.avatarColor"></div>
              <div>
                <h4 class="font-bold text-sm text-[#3E5219]">{{ t.name }}</h4>
                <p class="text-xs text-on-surface-variant">{{ t.role }}</p>
              </div>
            </div>
            @if (t.mapsUrl) {
              <a [href]="t.mapsUrl" target="_blank" rel="noopener noreferrer" class="text-xs text-primary hover:text-primary-container transition-colors flex items-center gap-1 whitespace-nowrap">
                Ver en Maps
                <span class="material-symbols-outlined text-sm">open_in_new</span>
              </a>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
