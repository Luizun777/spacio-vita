<footer class="w-full bg-[#F5F5DC] mt-20 border-t border-[#dbdcc3]">
  <div class="w-full px-8 py-12 flex flex-col md:flex-row justify-between items-center max-w-7xl mx-auto">

    <!-- Brand -->
    <div class="mb-8 md:mb-0">
      <div class="font-headline italic text-xl text-[#3E5219]">Spacio Vita</div>
      <p class="text-sm leading-relaxed text-[#3E5219] opacity-70 mt-2">
        Dedicados a tu salud desde un enfoque holístico y científico.
      </p>
    </div>

    <!-- Links & icons -->
    <div class="flex flex-col md:flex-row gap-8 items-center">
      <div class="flex gap-6">
        @for (link of links; track link.label) {
          <a [href]="link.href"
             class="text-sm text-[#3E5219] opacity-70 hover:opacity-100 transition-opacity">
            {{ link.label }}
          </a>
        }
      </div>
      <div class="flex gap-4">
        <span class="material-symbols-outlined text-[#3E5219]">public</span>
        <span class="material-symbols-outlined text-[#3E5219]">medical_information</span>
        <span class="material-symbols-outlined text-[#3E5219]">verified_user</span>
      </div>
    </div>

  </div>

  <!-- Copyright -->
  <div class="w-full text-center pb-8">
    <p class="text-sm text-[#3E5219] opacity-70">
      &copy; {{ currentYear }} Spacio Vita. Clinical Sanctuary.
    </p>
  </div>
</footer>
