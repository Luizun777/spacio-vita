<section id="hero" class="relative min-h-screen flex items-end overflow-hidden bg-[#0D0608]">

  <!-- Preloader -->
  <div class="hero-preloader fixed inset-0 z-[100] bg-[#0D0608] flex items-center justify-center">
    <div class="text-center">
      <p class="text-[#FFBB00] italic font-headline text-4xl tracking-widest opacity-0 preloader-brand">Spacio Vita</p>
      <div class="mt-4 w-48 h-px bg-[#FFBB00]/20 mx-auto overflow-hidden">
        <div class="preloader-bar h-full bg-[#FFBB00] w-0"></div>
      </div>
    </div>
  </div>

  <!-- Background -->
  <div class="absolute inset-0 z-0">
    <img
      class="hero-bg w-full h-full object-cover opacity-40 scale-110"
      src="https://lh3.googleusercontent.com/aida-public/AB6AXuDIW0qtcdH5eVMAnKvZKuR-p9hspfVHTgIvhshiGezf-Bcfm8dWjKsqEhNrDyPygW2drmoQQlF2OXWQ235MUBsVYHTQbk9uyNyOqHjVRGJCNm0zxzQn1cQJiIQTlVFvQ6kQtvQONQscpFwKXbgg2lqm_sF1Lo9iuWxA8o0whcsPqPTCVON4J8B75lpCeJVxNtKSINRR_kWk3NBGXlSZRM2iVdbDWhWVU3CHgIEqmyn_yjMOGiTRMgSB6CZ_HCJkHYIGYw4-jYx0S9s"
      alt="Spacio Vita">
    <div class="absolute inset-0 bg-gradient-to-t from-[#0D0608] via-[#0D0608]/40 to-transparent"></div>
    <div class="absolute inset-0 bg-gradient-to-r from-[#0D0608]/80 to-transparent"></div>
  </div>

  <!-- Content - bottom aligned -->
  <div class="relative z-10 w-full max-w-screen-xl mx-auto px-8 pb-24 pt-40">

    <!-- Gold line + eyebrow -->
    <div class="hero-eyebrow flex items-center gap-4 mb-8 opacity-0">
      <div class="w-16 h-px bg-[#FFBB00]"></div>
      <span class="text-[#FFBB00] text-xs tracking-[0.4em] uppercase font-medium">Centro de Bienestar Integral</span>
    </div>

    <!-- Split title - each line animates separately -->
    <h1 class="font-headline text-7xl md:text-9xl font-bold text-white leading-none mb-8">
      <span class="hero-line-1 block overflow-hidden">
        <span class="block translate-y-full">Tu Bienestar,</span>
      </span>
      <span class="hero-line-2 block overflow-hidden">
        <span class="block translate-y-full text-[#FFBB00] italic">Nuestra Pasión.</span>
      </span>
    </h1>

    <!-- Description + CTA row -->
    <div class="hero-bottom flex flex-col md:flex-row items-start md:items-end gap-8 opacity-0">
      <p class="text-white/60 text-lg leading-relaxed max-w-md font-light">
        Medicina, nutrición y estética de vanguardia en un entorno diseñado para tu paz interior.
      </p>
      <div class="flex gap-4 shrink-0">
        <button (click)="scrollToContact()"
          class="bg-[#FFBB00] text-[#0D0608] px-8 py-4 text-xs font-bold tracking-[0.2em] uppercase hover:bg-white transition-colors duration-300">
          Reservar
        </button>
        <button (click)="scrollToServices()"
          class="border border-white/20 text-white px-8 py-4 text-xs font-bold tracking-[0.2em] uppercase hover:border-[#FFBB00] hover:text-[#FFBB00] transition-colors duration-300">
          Servicios
        </button>
      </div>
    </div>

  </div>

  <!-- Scroll indicator -->
  <div class="hero-scroll absolute bottom-8 right-8 z-10 flex flex-col items-center gap-3 opacity-0">
    <span class="text-white/30 text-[10px] tracking-[0.3em] uppercase [writing-mode:vertical-rl]">Scroll</span>
    <div class="w-px h-16 bg-gradient-to-b from-[#FFBB00]/60 to-transparent"></div>
  </div>

</section>
