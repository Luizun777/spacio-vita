<section id="hero" class="relative min-h-screen flex items-center pt-20 overflow-hidden">
  <!-- Background image -->
  <div class="absolute inset-0 z-0">
    <img
      src="https://lh3.googleusercontent.com/aida-public/AB6AXuDIW0qtcdH5eVMAnKvZKuR-p9hspfVHTgIvhshiGezf-Bcfm8dWjKsqEhNrDyPygW2drmoQQlF2OXWQ235MUBsVYHTQbk9uyNyOqHjVRGJCNm0zxzQn1cQJiIQTlVFvQ6kQtvQONQscpFwKXbgg2lqm_sF1Lo9iuWxA8o0whcsPqPTCVON4J8B75lpCeJVxNtKSINRR_kWk3NBGXlSZRM2iVdbDWhWVU3CHgIEqmyn_yjMOGiTRMgSB6CZ_HCJkHYIGYw4-jYx0S9s"
      alt="Entorno sereno de bienestar"
      class="hero-bg-image w-full h-full object-cover">
    <div class="absolute inset-0 bg-gradient-to-r from-[#F5F5DC] via-[#F5F5DC]/40 to-transparent"></div>
  </div>

  <!-- Content -->
  <div class="relative z-10 max-w-screen-2xl mx-auto px-8 w-full">
    <div class="max-w-2xl">
      <span class="hero-badge inline-block px-4 py-1 rounded-full bg-primary-fixed text-on-primary-fixed-variant text-sm font-semibold tracking-wider mb-6">
        BIENVENIDO A TU SANTUARIO
      </span>
      <h1 class="text-6xl md:text-8xl font-bold leading-tight text-on-surface mb-8">
        Tu Bienestar,<br>Nuestra Pasión
      </h1>
      <p class="hero-description text-xl text-on-surface-variant leading-relaxed mb-12 font-light">
        Descubre un enfoque integral para tu salud. Combinamos medicina de vanguardia, nutrición
        consciente y terapias de relajación profunda en un entorno diseñado para tu paz.
      </p>
      <div class="hero-buttons flex flex-wrap gap-4">
        <button
          class="bg-primary text-on-primary px-10 py-5 rounded-full text-lg font-semibold hover:opacity-90 transition-all shadow-xl shadow-primary/10"
          (click)="scrollToContact()">
          Reservar Ahora
        </button>
        <button
          class="bg-surface-container-lowest text-primary px-10 py-5 rounded-full text-lg font-semibold hover:bg-surface-container-low transition-all"
          (click)="scrollToServices()">
          Explorar Servicios
        </button>
      </div>
    </div>
  </div>
</section>
