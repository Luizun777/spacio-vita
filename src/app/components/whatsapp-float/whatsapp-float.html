<a [href]="getWhatsappLink()"
   target="_blank"
   rel="noopener noreferrer"
   class="whatsapp-float fixed bottom-6 right-6 z-40 flex items-center justify-center
          w-14 h-14 md:w-16 md:h-16 bg-[#25D366] hover:bg-[#20BA5A] rounded-full
          shadow-lg hover:shadow-2xl transition-all duration-300 hover:scale-110
          active:scale-95 group"
   title="Chatear por WhatsApp">

  <i class="fab fa-whatsapp text-white text-2xl md:text-3xl group-hover:scale-125 transition-transform"></i>

</a>
