<section id="contacto" class="py-32 bg-surface">
  <div class="max-w-4xl mx-auto px-8">
    <div class="bg-surface-container-low rounded-[3rem] p-12 md:p-20 relative overflow-hidden">

      <!-- Header -->
      <div class="relative z-10 text-center mb-12">
        <h2 class="text-4xl font-bold mb-4">Contáctanos</h2>
        <p class="text-on-surface-variant">
          Estamos aquí para responder tus preguntas y agendar tu primera visita.
        </p>
      </div>

      <!-- Success message -->
      @if (submitted) {
        <div class="relative z-10 text-center py-12">
          <span class="material-symbols-outlined text-primary text-6xl mb-4 block">check_circle</span>
          <h3 class="text-2xl font-bold text-primary mb-2">¡Solicitud enviada!</h3>
          <p class="text-on-surface-variant">Nos pondremos en contacto contigo pronto.</p>
        </div>
      }

      <!-- Form -->
      @if (!submitted) {
        <form class="relative z-10 space-y-6" (ngSubmit)="onSubmit()" #contactForm="ngForm">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-semibold mb-2 ml-1">Nombre Completo</label>
              <input
                class="w-full bg-white/60 border-none rounded-xl focus:ring-2 focus:ring-primary/30 py-4 px-6"
                type="text"
                placeholder="Ej. Ana García"
                [(ngModel)]="form.nombre"
                name="nombre"
                required>
            </div>
            <div>
              <label class="block text-sm font-semibold mb-2 ml-1">Correo Electrónico</label>
              <input
                class="w-full bg-white/60 border-none rounded-xl focus:ring-2 focus:ring-primary/30 py-4 px-6"
                type="email"
                placeholder="ana@ejemplo.com"
                [(ngModel)]="form.email"
                name="email"
                required>
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold mb-2 ml-1">Servicio de Interés</label>
            <select
              class="w-full bg-white/60 border-none rounded-xl focus:ring-2 focus:ring-primary/30 py-4 px-6"
              [(ngModel)]="form.servicio"
              name="servicio">
              @for (s of servicios; track s) {
                <option [value]="s">{{ s }}</option>
              }
            </select>
          </div>

          <div>
            <label class="block text-sm font-semibold mb-2 ml-1">Mensaje</label>
            <textarea
              class="w-full bg-white/60 border-none rounded-xl focus:ring-2 focus:ring-primary/30 py-4 px-6"
              rows="4"
              placeholder="¿Cómo podemos ayudarte?"
              [(ngModel)]="form.mensaje"
              name="mensaje">
            </textarea>
          </div>

          <button
            type="submit"
            class="w-full bg-primary text-on-primary py-5 rounded-full text-lg font-bold hover:opacity-95 transition-all">
            Enviar Solicitud
          </button>
        </form>
      }

    </div>
  </div>
</section>
