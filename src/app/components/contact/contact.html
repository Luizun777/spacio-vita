<section id="contacto" class="py-16 md:py-32 bg-surface">
  <div class="max-w-screen-xl mx-auto px-4 sm:px-6 md:px-8">

    <!-- Map -->
    <div class="mb-8 md:mb-12 rounded-2xl md:rounded-3xl overflow-hidden shadow-md">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3762.5!2d-99.1600528!3d19.3627159!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85d1ff003e63593b%3A0xc4f94b3dee8653f!2sSpacio%20Vita!5e0!3m2!1ses!2smx!4v1"
        width="100%"
        height="250"
        style="border:0;"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        title="Ubicación de Spacio Vita">
      </iframe>
    </div>

    <!-- Info + Contact side by side -->
    <div class="flex flex-col lg:flex-row gap-4 md:gap-8 items-start">

      <!-- Location info -->
      <div class="lg:w-1/3 w-full bg-surface-container-low rounded-2xl md:rounded-3xl p-6 md:p-10">
        <h3 class="text-2xl font-bold mb-6">Encuéntranos</h3>
        <div class="space-y-5 text-sm">
          <div class="flex items-start gap-3">
            <span class="material-symbols-outlined text-primary shrink-0">location_on</span>
            <p class="text-on-surface-variant leading-relaxed">Spacio Vita — Ciudad de México</p>
          </div>
          <div class="flex items-start gap-3">
            <span class="material-symbols-outlined text-primary shrink-0">directions</span>
            <a
              href="https://www.google.com/maps/place/Spacio+Vita/@19.3591769,-99.1574758,15z/data=!4m6!3m5!1s0x85d1ff003e63593b:0xc4f94b3dee8653f!8m2!3d19.3627159!4d-99.1600528!16s%2Fg%2F11wc2yg9ny"
              target="_blank"
              rel="noopener noreferrer"
              class="text-primary font-semibold hover:underline">
              Cómo llegar →
            </a>
          </div>
        </div>
      </div>

      <!-- Contact CTA -->
      <div class="lg:w-2/3 w-full">
        <div class="bg-surface-container-low rounded-2xl md:rounded-[3rem] p-6 sm:p-8 md:p-12 lg:p-16 relative overflow-hidden">

          <!-- Header -->
          <div class="relative z-10 text-center mb-8 md:mb-12">
            <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-3 md:mb-4">Contáctanos</h2>
            <p class="text-xs sm:text-sm md:text-base text-on-surface-variant px-2">
              Comunícate con nosotros por WhatsApp o llamanos directamente.
            </p>
          </div>

          <!-- Contact Options -->
          <div class="relative z-10 space-y-4 md:space-y-6">

            <!-- WhatsApp Button -->
            <a
              [href]="getWhatsappLink()"
              target="_blank"
              rel="noopener noreferrer"
              class="flex flex-col sm:flex-row sm:items-center sm:justify-between w-full bg-gradient-to-r from-green-50 to-emerald-50 border-2 border-green-200 hover:border-green-400 rounded-xl md:rounded-2xl p-4 sm:p-6 transition-all hover:shadow-lg active:scale-95">
              <div class="flex items-center gap-3 sm:gap-4 mb-2 sm:mb-0">
                <span class="material-symbols-outlined text-green-600 text-3xl sm:text-4xl shrink-0">whatsapp</span>
                <div class="text-left">
                  <h3 class="font-bold text-green-900 text-sm sm:text-lg">Escríbenos por WhatsApp</h3>
                  <p class="text-xs sm:text-sm text-green-700">Respuesta rápida</p>
                </div>
              </div>
              <span class="material-symbols-outlined text-green-600 text-xl sm:ml-auto">arrow_forward</span>
            </a>

            <!-- Divider -->
            <div class="flex items-center gap-3 text-on-surface-variant">
              <div class="flex-1 h-px bg-surface-variant"></div>
              <span class="text-xs">O también</span>
              <div class="flex-1 h-px bg-surface-variant"></div>
            </div>

            <!-- Phone Button -->
            <a
              [href]="getPhoneLink()"
              class="flex flex-col sm:flex-row sm:items-center sm:justify-between w-full bg-gradient-to-r from-blue-50 to-cyan-50 border-2 border-blue-200 hover:border-blue-400 rounded-xl md:rounded-2xl p-4 sm:p-6 transition-all hover:shadow-lg active:scale-95">
              <div class="flex items-center gap-3 sm:gap-4 mb-2 sm:mb-0">
                <span class="material-symbols-outlined text-blue-600 text-3xl sm:text-4xl shrink-0">call</span>
                <div class="text-left">
                  <h3 class="font-bold text-blue-900 text-sm sm:text-lg">Llamanos</h3>
                  <p class="text-xs sm:text-sm text-blue-700">+52 3576 0433</p>
                </div>
              </div>
              <span class="material-symbols-outlined text-blue-600 text-xl sm:ml-auto">arrow_forward</span>
            </a>

          </div>

        </div>
      </div>

    </div>
  </div>
</section>
