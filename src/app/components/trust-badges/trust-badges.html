<section id="trust-badges" class="py-12 md:py-20 bg-[#0D0608] border-y border-white/10">
  <div class="max-w-screen-xl mx-auto px-4 sm:px-6 md:px-8">

    <!-- Header -->
    <div class="badges-header text-center mb-12 md:mb-16 opacity-0">
      <h3 class="font-headline text-2xl md:text-3xl text-white mb-2">Por qué confiar en nosotros</h3>
      <p class="text-white/50 text-sm md:text-base">Estándares internacionales de calidad y profesionalismo</p>
    </div>

    <!-- Badges Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
      @for (badge of badges; track badge.title) {
        <div class="badge-item bg-[#160B0D] border border-white/5 rounded-xl p-6 text-center
                    hover:border-[#FFBB00]/30 transition-all duration-300 opacity-0">

          <!-- Icon -->
          <div class="text-4xl mb-4">{{ badge.icon }}</div>

          <!-- Title -->
          <h4 class="font-headline text-lg text-white mb-2">{{ badge.title }}</h4>

          <!-- Description -->
          <p class="text-white/60 text-sm leading-relaxed">{{ badge.description }}</p>

        </div>
      }
    </div>

  </div>
</section>
